<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Office Madness</title>
    <style>
        /* Анимация плавного появления всей страницы */
        @keyframes flashFade {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        body {
            background-color: #0b0b0b;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
            margin: 0;
            padding: 50px;
            animation: flashFade 1.2s ease-out;
        }
        h1 {
            font-size: 3.5rem;
            color: #ff3333;
            text-shadow: 0 0 20px #ff3333, 2px 2px #000;
            letter-spacing: 5px;
            margin-bottom: 10px;
        }
        p {
            font-size: 1.2rem;
            color: #888;
            margin-bottom: 50px;
            letter-spacing: 2px;
        }
        /* Общие базовые стили для всех неоновых кнопок */
        .flash-btn {
            display: inline-block;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #00ffcc;
            background: transparent;
            border: 3px solid #00ffcc;
            cursor: pointer;
            text-decoration: none;
            text-transform: uppercase;
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.2);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        /* Общий эффект наведения (увеличение и наклон как во Flash) */
        .flash-btn:hover {
            color: #0b0b0b;
            background-color: #00ffcc;
            box-shadow: 0 0 30px #00ffcc;
            transform: scale(1.1) rotate(-2deg);
        }
        /* Контейнер, удерживающий все четыре кнопки в красивой сетке */
        .btn-container {
            margin-top: 50px; 
            display: flex; 
            justify-content: center; 
            gap: 20px; 
            flex-wrap: wrap;
            max-width: 1100px;
            margin-left: auto;
            margin-right: auto;
        }
        
        /* 1. Настройки для желтой кнопки лога */
        .lore-btn {
            color: #ffe600; 
            border-color: #ffe600; 
            box-shadow: 0 0 10px rgba(255, 230, 0, 0.2);
        }
        .lore-btn:hover {
            background-color: #ffe600;
            box-shadow: 0 0 30px #ffe600;
        }

        /* 2. Настройки для фиолетовой кнопки персонажей */
        .char-btn {
            color: #cc00ff; 
            border-color: #cc00ff; 
            box-shadow: 0 0 10px rgba(204, 0, 255, 0.2);
        }
        .char-btn:hover {
            background-color: #cc00ff;
            box-shadow: 0 0 30px #cc00ff;
        }

        /* 3. Настройки для красной кнопки бестиария */
        .bestiary-btn {
            color: #ff3333; 
            border-color: #ff3333; 
            box-shadow: 0 0 10px rgba(255, 51, 51, 0.2);
        }
        .bestiary-btn:hover {
            background-color: #ff3333;
            box-shadow: 0 0 30px #ff3333;
        }
    </style>
</head>
<body>

    <h1>OFFICE MADNESS</h1>
    <p>WELCOME TO THE INSANITY. ANIMATION SERIES COMING SOON.</p>
    
    <!-- СЕТКА ИЗ ЧЕТЫРЕХ КНОПОК -->
    <div class="btn-container">
        <a href="teaser.html" class="flash-btn">WATCH TEASER</a>
        <a href="lore.html" class="flash-btn lore-btn">LORE & LOGS</a>
        <a href="characters.html" class="flash-btn char-btn">CHARACTERS</a>
        <a href="bestiary.html" class="flash-btn bestiary-btn">BESTIARY</a>
    </div>

</body>
</html>
